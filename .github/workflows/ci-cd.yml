name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: hoangmelinh/elearning-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: hoangmelinh/elearning-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: docker-build
    # Chỉ chạy deploy khi sự kiện là push (không chạy khi có pull request)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Starting deployment..."
            
            # Pull latest images from Docker Hub
            docker pull hoangmelinh/elearning-backend:latest
            docker pull hoangmelinh/elearning-frontend:latest
            
            # Di chuyển vào thư mục chứa project trên EC2 (bạn hãy sửa lại đường dẫn này nếu cần)
            cd elearning
            
            # Restart các containers sử dụng docker-compose.prod.yml
            # Đảm bảo file docker-compose.prod.yml và .env đã có sẵn trên server ở thư mục này
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d
            
            echo "Deployment successful!"
