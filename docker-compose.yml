version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: elearning-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-elearning_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/Schema:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c "lc_collate=en_US.utf8" -c "lc_ctype=en_US.utf8"

  backend:
    build: 
      context: ./backend
    container_name: elearning-backend
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/elearning_db
      - DB_USER=postgres
      - DB_PASS=postgres
      - SPRING_PROFILES_ACTIVE=dev
      - AWS_REGION=us-east-1
      - AWS_BUCKET=elearning-local
      - JWT_SECRET=test_secret_for_development_purposes_only_change_in_prod_12345678901234567890
      - CLOUDINARY_URL=${CLOUDINARY_URL}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: elearning-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8081/api
    depends_on:
      - backend

volumes:
  postgres-data:
