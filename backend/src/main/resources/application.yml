server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    serialization:
      fail-on-empty-beans: false

---
spring:
  config:
    import: optional:file:../.env[.properties]
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/elearning_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Automatically update schema to match entities
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:very_secret_default_key_for_development_purposes_only_12345}
    access-token-expiration-ms: 900000 # 15 minutes
    refresh-token-expiration-ms: 604800000 # 7 days
  aws:
    region: ${AWS_REGION:us-east-1}
    s3:
      bucket: ${AWS_BUCKET:elearning-local}
  cloudinary:
    url: ${CLOUDINARY_URL:}

nvidia:
  api:
    key: ${NVIDIA_API_KEY:default-mock-key}
    url: ${NVIDIA_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
    model: ${NVIDIA_API_MODEL:meta/llama-3.1-70b-instruct}
  stt:
    url: ${NVIDIA_STT_URL:https://integrate.api.nvidia.com/v1/audio/transcriptions}
    model: ${NVIDIA_STT_MODEL:openai/whisper-large-v3}

logging:
  level:
    org.springframework.security: DEBUG
    com.elearning: DEBUG